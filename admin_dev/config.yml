# Sveltia CMS configuration

# This is where we configure the CMS repo and its collections and fields
# Sveltia CMS generally follows the Decap CMS configuration spec
# Decap CMS docs: https://decapcms.org/docs/intro/
# Sveltia CMS docs: https://github.com/sveltia/sveltia-cms#features

local_backend: true

# Enter your GitHub repo path and branch (defaults to master)
backend:
  name: github
  repo: dyvenia/site-dyvenia
  branch: dev

# The folder used to store uploaded images
media_folder: '/src/assets/images/'
public_folder: '/assets/images/'

# The CMS collections and their fields
collections:
  - name: 'home'
    label: 'Home Page'
    icon: 'home'
    create: false
    extension: 'njk'
    format: 'frontmatter'
    files:
      - file: 'src/pages/index.njk'
        label: 'Home'
        name: 'home'
        fields:
          - label: 'Hero'
            name: 'hero'
            widget: 'object'
            fields:
              - {label: 'Title', name: 'title', widget: 'markdown'}
              - {label: 'Subtitle', name: 'subtitle', widget: 'markdown'}
              - {label: 'Button Text', name: 'button_text', widget: 'string'}
              - {label: 'Button Target', name: 'button_target', widget: 'string'}
              - {label: 'Image', name: 'image', widget: 'hidden', required: false}
              - {label: 'Video', name: 'video', widget: 'file', required: false}
          - label: 'Introduction'
            name: 'intro'
            widget: 'object'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Content Left', name: 'content_left', widget: 'markdown'}
              - {label: 'Content Right', name: 'content_right', widget: 'markdown'}
          - label: 'Highlight One'
            name: 'highlight_one'
            widget: 'object'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Subtitle', name: 'subtitle', widget: 'markdown'}
          - label: 'Highlight Two'
            name: 'highlight_two'
            widget: 'object'
            fields:
              - {label: 'Title One', name: 'title1', widget: 'string'}
              - {label: 'Title Two', name: 'title2', widget: 'string'}
              - {label: 'Content', name: 'content', widget: 'markdown'}
          - label: '5 Foundations Titles'
            name: 'foundations_titles'
            widget: 'object'
            fields:
              - {label: 'Title One', name: 'title1', widget: 'string'}
              - {label: 'Title Two', name: 'title2', widget: 'string'}
          - label: 'Foundations Keys'
            name: 'foundations_elements' #<- this doesn't seem to work
            widget: 'list'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Content', name: 'content', widget: 'string'}
          - label: 'About Us'
            name: 'about'
            widget: 'object'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Content', name: 'content', widget: 'markdown'}
          - label: 'Why Us Intro'
            name: 'whyus_intro'
            widget: 'object'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Content', name: 'content', widget: 'string'}
          - label: 'Why Us - Elements'
            name: 'whyus_elements'
            widget: 'list'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Content', name: 'content', widget: 'string'}
          - label: 'Our Services'
            name: 'our_services'
            widget: 'object'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
          - label: 'Our Services Items'
            name: 'our_services_items'
            widget: 'list'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Prefix', name: 'prefix', widget: 'string'}
              - {label: 'Description', name: 'description', widget: 'markdown'}

  - name: 'blog'
    label: 'Posts'
    label_singular: 'Post'
    folder: 'src/posts'
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    media_folder: '/src/assets/images/blog/'
    public_folder: '/assets/images/blog/'
    fields:
      - {label: 'Title', name: 'title', widget: 'string'}
      - {label: 'Publish Date', name: 'date', widget: 'datetime', format: 'YYYY-MM-DD HH:mm:ss'}
      - label: 'Author'
        name: 'author'
        widget: 'relation'
        collection: 'team'
        search_fields: ['name']
        value_field: 'name'
        display_fields: ['name']
      - {label: 'Description', name: 'description', widget: 'text'}
      - {
          label: 'Tags',
          name: 'tags',
          widget: 'list',
          default: ['post'],
          hint: 'Enter tags separated by a comma'
        }
      - {label: 'Internal Notes', name: 'internal_notes', widget: 'markdown'}
      - {label: 'Body', name: 'body', widget: 'markdown', modes: [raw, rich_text]}

  - name: 'insights'
    label: 'Insights Page'
    icon: 'article'
    create: false
    extension: 'njk'
    format: 'frontmatter'
    media_folder: '/src/assets/images/backgrounds/'
    files:
      - file: 'src/pages/blog.njk'
        label: 'Insights'
        name: 'insights'
        fields:
          - {name: 'title', label: 'Title', widget: 'string'}
          - {name: 'permalink', label: 'Permalink', widget: 'hidden'}
          - {name: 'description', label: 'Meta Description', widget: 'text'}
          - {name: 'layout', label: 'Layout', widget: 'hidden'}
          - {name: 'bodyClass', label: 'Body Class', widget: 'hidden', required: false}
          - {name: 'footerSpace', label: 'Footer Space Class', widget: 'hidden', required: false}
          - {name: 'intro', label: 'Intro Text', widget: 'markdown'}
          - {name: 'image', label: 'Hero Image', widget: 'hidden'}

  - name: 'case_studies'
    label: 'Case Studies'
    label_singular: 'Case Study'
    icon: 'stars_2'
    folder: 'src/case_studies'
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    media_folder: '/src/assets/images/blog/'
    fields:
      - {label: 'Title', name: 'title', widget: 'string'}
      - {label: 'Publish Date', name: 'date', widget: 'datetime', format: 'YYYY-MM-DD HH:mm:ss'}
      - {label: 'Description', name: 'description', widget: 'text'}
      - {label: 'Internal Notes', name: 'internal_notes', widget: 'markdown'}
      - {label: 'Body', name: 'body', widget: 'markdown', modes: [raw, rich_text]}

  - name: 'imprint'
    label: 'Imprint'
    icon: 'policy'
    extension: 'yaml'
    format: 'yaml'
    files:
      - file: 'src/_data/personal.yaml'
        label: 'Site Imprint'
        name: 'site'
        fields:
          - {
              label: 'Email',
              name: 'email',
              widget: 'string',
              hint: 'Public company email address i.e. hello@company.com'
            }
          - {label: 'Address', name: 'address', widget: 'text', hint: 'Your company legal address'}

  - name: 'about'
    label: 'About Page'
    icon: 'emoji_people'
    create: false
    extension: 'njk'
    format: 'frontmatter'
    media_folder: '/src/assets/images/team/'
    files:
      - file: 'src/pages/about.njk'
        label: 'About'
        name: 'about'
        fields:
          - {name: 'title', label: 'Title', widget: 'string'}
          - {name: 'permalink', label: 'Permalink', widget: 'hidden'}
          - {name: 'description', label: 'Meta Description', widget: 'text'}
          - {name: 'layout', label: 'Layout', widget: 'hidden'}
          - {name: 'bodyClass', label: 'Body Class', widget: 'hidden', required: false}
          - {name: 'footerSpace', label: 'Footer Space Class', widget: 'hidden', required: false}
          - {name: 'intro', label: 'Intro Text', widget: 'markdown'}
          - {name: 'experts', label: 'Experts Label', widget: 'string'}
          - label: 'Team Section'
            name: 'team'
            widget: 'object'
            fields:
              - {name: 'activate', label: 'Activate', widget: 'boolean', required: false}
              - {name: 'title', label: 'Team Title', widget: 'string', required: false}
              - {name: 'content', label: 'Team Content', widget: 'markdown', required: false}
              - {name: 'image', label: 'Team Image', widget: 'image', required: false}
              - {name: 'image_alt', label: 'Image Alt Text', widget: 'text', required: false}

  - name: 'team'
    label: 'Team Members'
    icon: 'group'
    folder: 'src/team'
    create: true
    extension: 'md'
    format: 'frontmatter'
    slug: '{{slug}}'
    media_folder: '/src/assets/images/team/'
    fields:
      - {label: 'Name', name: 'name', widget: 'string'}
      - {label: 'Profile Picture', name: 'image', widget: 'image'}
      - {
          label: 'LinkedIn',
          name: 'linkedin',
          widget: 'string',
          required: false,
          hint: 'Add full LinkedIn URL'
        }
      - {label: 'Show on About Page?', name: 'show_on_about', widget: 'boolean', default: false}
      - {
          label: 'About/Home Display Order',
          name: 'show_on_about_order',
          widget: 'number',
          value_type: 'int',
          min: 1,
          default: 99,
          required: false,
          hint: 'Lower numbers are shown first on home and about pages'
        }
      - {label: 'Role', name: 'role', widget: 'string', required: false}
      - {label: 'Short Description', name: 'description_short', widget: 'text', required: false}
      - {label: 'Long Description', name: 'description_long', widget: 'markdown', required: false}
      - {
          label: 'Expertise',
          name: 'expertise',
          widget: 'list',
          required: false,
          collapsed: true,
          field: {label: 'Item', name: 'item', widget: 'string'}
        }
      - {
          label: 'Technologies',
          name: 'technologies',
          widget: 'list',
          required: false,
          collapsed: true,
          field: {label: 'Item', name: 'item', widget: 'string'}
        }

  - name: 'our_process'
    label: 'Our Process'
    icon: 'timeline'
    create: false
    extension: 'njk'
    format: 'frontmatter'
    files:
      - file: 'src/pages/our-process.njk'
        label: 'Our Process'
        name: 'our_process'
        fields:
          - {label: 'Title', name: 'title', widget: 'string'}
          - {label: 'Description', name: 'description', widget: 'string'}
          - label: 'Hero'
            name: 'hero'
            widget: 'object'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Subtitle', name: 'subtitle', widget: 'markdown'}
              - {label: 'Button Text', name: 'button_text', widget: 'string'}
              - {label: 'Button Target', name: 'button_target', widget: 'string'}
              - {label: 'Image', name: 'image', widget: 'hidden', required: false}
              - {label: 'Image Alt', name: 'image_alt', widget: 'hidden', required: false}
          - label: 'Introduction'
            name: 'intro'
            widget: 'object'
            fields:
              - {label: 'Title 1', name: 'title1', widget: 'string'}
              - {label: 'Title 2', name: 'title2', widget: 'string'}
              - {label: 'Content', name: 'content', widget: 'markdown'}
          - label: 'What Are Section'
            name: 'what_are'
            widget: 'object'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Content', name: 'content', widget: 'markdown'}
              - {label: 'Button Text', name: 'button_text', widget: 'string'}
              - {label: 'Button Target', name: 'button_target', widget: 'string'}
              - {label: 'Image', name: 'image', widget: 'image'}
              - {label: 'Image Alt', name: 'image_alt', widget: 'string', required: false}
          - label: 'Steps'
            name: 'steps'
            widget: 'object'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Intro', name: 'intro', widget: 'markdown'}
              - {label: 'Title Outcomes', name: 'title_outcomes', widget: 'string'}
              - {label: 'Title What', name: 'title_what', widget: 'string'}
          - label: 'Process Stages'
            name: 'steps_elements'
            widget: 'object'
            fields:
              - label: 'Stage 1'
                name: 'stage_1'
                widget: 'object'
                fields:
                  - {label: 'Label', name: 'label', widget: 'string'}
                  - {label: 'Name', name: 'name', widget: 'string'}
                  - label: 'Steps'
                    name: 'steps'
                    widget: 'list'
                    collapsed: true
                    min: 2
                    max: 2
                    fields:
                      - {label: 'Label', name: 'label', widget: 'string'}
                      - {label: 'Title', name: 'title', widget: 'string'}
                      - {label: 'Content', name: 'content', widget: 'markdown'}
                      - {label: 'Outcomes', name: 'outcomes', widget: 'markdown'}

              - label: 'Stage 2'
                name: 'stage_2'
                widget: 'object'
                fields:
                  - {label: 'Label', name: 'label', widget: 'string'}
                  - {label: 'Name', name: 'name', widget: 'string'}
                  - label: 'Steps'
                    name: 'steps'
                    widget: 'list'
                    collapsed: true
                    min: 2
                    max: 2
                    fields:
                      - {label: 'Label', name: 'label', widget: 'string'}
                      - {label: 'Title', name: 'title', widget: 'string'}
                      - {label: 'Content', name: 'content', widget: 'markdown'}
                      - {label: 'Outcomes', name: 'outcomes', widget: 'markdown'}

          - label: 'Why Section'
            name: 'why'
            widget: 'object'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Intro', name: 'intro', widget: 'markdown'}
          - label: 'Why Elements'
            name: 'why_elements'
            widget: 'list'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Content', name: 'content', widget: 'markdown'}
          - label: 'FAQ'
            name: 'faq'
            widget: 'object'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Intro', name: 'intro', widget: 'markdown'}
              - label: 'Call to Action'
                name: 'cta'
                widget: 'object'
                fields:
                  - {label: 'Label', name: 'label', widget: 'string'}
                  - {label: 'Target', name: 'target', widget: 'string'}
              - label: 'FAQ Items'
                name: 'items'
                widget: 'list'
                fields:
                  - {label: 'Title', name: 'title', widget: 'string'}
                  - {label: 'Content', name: 'content', widget: 'markdown'}

  - name: 'careers'
    label: 'Careers'
    icon: 'work'
    create: false
    extension: 'njk'
    format: 'frontmatter'
    files:
      - file: 'src/pages/careers.njk'
        label: 'Careers'
        name: 'careers'
        fields:
          - {label: 'Title', name: 'title', widget: 'string'}
          - {label: 'Description', name: 'description', widget: 'string'}
          - {label: 'Layout', name: 'layout', widget: 'hidden'}
          - {label: 'Permalink', name: 'permalink', widget: 'hidden'}
          - {label: 'Body Class', name: 'bodyClass', widget: 'hidden'}
          - label: 'Hero'
            name: 'hero'
            widget: 'object'
            fields:
              - {label: 'Title', name: 'title', widget: 'markdown'}
              - {label: 'Subtitle', name: 'subtitle', widget: 'markdown'}
              - {label: 'Image', name: 'image', widget: 'hidden', required: false}
              - {label: 'Button Text', name: 'button_text', widget: 'string'}
              - {label: 'Button Target', name: 'button_target', widget: 'string'}
          - label: 'Values Section'
            name: 'values'
            widget: 'object'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Content', name: 'content', widget: 'markdown'}
          - label: 'What We Offer Section'
            name: 'offers'
            widget: 'object'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Intro', name: 'intro', widget: 'markdown'}
              - label: 'Offer Items'
                name: 'items'
                widget: 'list'
                fields:
                  - {label: 'Title', name: 'title', widget: 'string'}
                  - {label: 'Content', name: 'content', widget: 'markdown'}
              - {label: 'Button Text', name: 'button_text', widget: 'string'}
              - {label: 'Button Target', name: 'button_target', widget: 'string'}
          - label: 'Application CTA Section'
            name: 'cta'
            widget: 'object'
            fields:
              - {label: 'Title', name: 'title', widget: 'string'}
              - {label: 'Subtitle', name: 'subtitle', widget: 'markdown'}
              - {label: 'Pre Button Text', name: 'pre', widget: 'markdown', required: false}
              - {label: 'Button Text', name: 'button_text', widget: 'string'}
              - {label: 'Button Target', name: 'button_target', widget: 'string'}
              - {label: 'Image', name: 'image', widget: 'hidden', required: false}
              - {label: 'Footer', name: 'footer', widget: 'markdown', required: false}

  - name: 'meta'
    label: 'Meta Fields'
    icon: 'settings'
    extension: 'yaml'
    format: 'yaml'
    files:
      - file: 'src/_data/meta.yaml'
        label: 'Meta Fields'
        name: 'meta'
        fields:
          - {
              label: 'Book Call Text',
              name: 'book_call',
              widget: 'string',
              hint: 'The text of the book a call button'
            }
          - {
              label: 'Book Call Link',
              name: 'book_call_link',
              widget: 'string',
              hint: 'The link  of the book a call button'
            }
          - {
              label: 'Newsletter Title',
              name: 'newsletter_title',
              widget: 'string',
              hint: 'The title of the newsletter subscription section'
            }
          - {
              label: 'Newsletter Consent Message',
              name: 'newsletter_consent_message',
              widget: 'text',
              hint: 'The message displayed next to the consent checkbox. Supports Markdown links.'
            }
          - {
              label: 'Newsletter Success Message',
              name: 'newsletter_success_message',
              widget: 'string',
              hint: 'Message shown when subscription is successful'
            }
          - {
              label: 'Newsletter Error Message',
              name: 'newsletter_error_message',
              widget: 'string',
              hint: 'Message shown when there is an error submitting the form'
            }
          - {
              label: 'Newsletter Consent Required Message',
              name: 'newsletter_consent_required',
              widget: 'string',
              hint: 'Message shown when the user tries to submit without giving consent'
            }
